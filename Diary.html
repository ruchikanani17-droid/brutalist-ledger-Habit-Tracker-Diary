<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutalist Systems Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- Neo-Brutalist Base --- */
        body {
            background-color: #EAEAEA; 
            background-image: radial-gradient(#000000 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Space Grotesk', sans-serif;
            color: #000; margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .ledger-container {
            background-color: #FFFFFF; width: 100%; max-width: 1400px;
            border: 4px solid #000; box-shadow: 12px 12px 0px #000;
            display: flex; flex-direction: column; margin-bottom: 40px;
        }

        /* --- Header & Fast Time Travel --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; border-bottom: 4px solid #000; background-color: #FFF;
            flex-wrap: wrap; gap: 20px;
        }

        .date-nav { display: flex; align-items: center; gap: 15px; background: #EAEAEA; padding: 5px 15px; border: 4px solid #000; }
        
        .nav-btn {
            background: #FFF; border: 4px solid #000; font-family: 'Space Grotesk', sans-serif;
            font-size: 24px; font-weight: 900; cursor: pointer; transition: 0.1s; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
        }
        .nav-btn:active { background: #000; color: #FFF; }
        
        .fast-travel-select {
            font-family: 'Space Grotesk', sans-serif; font-size: 40px; font-weight: 900; text-transform: uppercase;
            background: transparent; border: none; outline: none; cursor: pointer;
            text-align: center; appearance: none; padding: 0 10px; transition: 0.2s;
        }
        .fast-travel-select:hover { background: #CCFF00; }
        
        .expense-total {
            background: #CCFF00; border: 4px solid #000; padding: 10px 20px;
            font-size: 24px; font-weight: 900; box-shadow: 4px 4px 0px #000; text-transform: uppercase;
        }

        /* --- Controls --- */
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls input { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; padding: 6px 12px; background: #FFF; border: 2px solid #000; outline: none; width: 150px; }
        .controls input:focus { background-color: #EAEAEA; }
        .controls button {
            font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 900; background: #FFF; border: 2px solid #000;
            cursor: pointer; padding: 6px 12px; text-transform: uppercase; box-shadow: 3px 3px 0px #000; transition: 0.1s;
        }
        .controls button:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }
        .controls button.good-btn:hover { background: #CCFF00; } 
        .controls button.bad-btn:hover { background: #FF0055; color: #FFF; } 

        /* --- FIXED RESPONSIVE MATRIX --- */
        .journal-wrapper { width: 100%; border-bottom: 4px solid #000; }
        .journal-content { display: flex; align-items: stretch; }

        .habit-section { 
            flex-grow: 1; 
            border-right: 4px solid #000; 
            background: #FFF; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        table { width: 100%; border-collapse: collapse; min-width: max-content; }
        tr { height: 50px; }
        
        /* Removed native CSS resize because our custom JS will handle it everywhere */
        th { 
            font-size: 16px; font-weight: 900; padding: 15px; 
            border-bottom: 4px solid #000; border-right: 2px solid #000; 
            text-transform: uppercase; background: #EAEAEA; white-space: nowrap; 
            overflow: hidden; position: relative; 
        }
        
        td { text-align: center; font-size: 24px; font-weight: 900; border-bottom: 2px solid #000; border-right: 2px solid #000; cursor: pointer; user-select: none; background: #FFF; }
        td:hover { background-color: #F0F0F0; }
        
        .date-col { 
            font-size: 20px; width: 60px; min-width: 60px; 
            position: sticky; left: 0; background-color: #EAEAEA; 
            border-right: 4px solid #000; z-index: 2;
        }

        /* --- CUSTOM MOBILE & DESKTOP RESIZE HANDLE --- */
        .touch-resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 15px; /* Wide enough for a finger to grab */
            height: 100%;
            cursor: col-resize;
            z-index: 10;
            background-color: transparent;
            transition: background-color 0.2s;
        }
        .touch-resizer:active, .touch-resizer:hover {
            background-color: #CCFF00; /* Turns neon green when you grab it */
        }

        .delete-col-btn { background: #FF0055; color: #FFF; border: 2px solid #000; font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 900; cursor: pointer; margin-left: 10px; padding: 2px 6px; box-shadow: 2px 2px 0px #000; transition: 0.1s; vertical-align: middle; }
        .delete-col-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .delete-col-btn:hover { background: #000; color: #FF0055; }

        .diary-btn { 
            background: #000; color: #FFF; border: none; font-family: 'Space Grotesk', sans-serif; 
            font-weight: 900; font-size: 14px; cursor: pointer; padding: 10px 15px; 
            letter-spacing: 1px; transition: 0.2s; width: 100%; height: 100%; box-sizing: border-box;
            min-height: 40px; 
        }
        .diary-btn:hover { background: #CCFF00; color: #000; }
        .expense-btn:hover { background: #00E5FF; color: #000; } 

        /* Right Side: Sleep Tracker */
        .chart-section { width: 450px; min-width: 350px; background: #FFF; position: relative; overflow: hidden; flex-shrink: 0;}
        .chart-header { height: 54px; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; border-bottom: 4px solid #000; background: #EAEAEA; }
        .chart-title-input { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 900; color: #000; background: transparent; border: none; outline: none; width: 100%; text-align: center; text-transform: uppercase; }
        .chart-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; color: #000; margin-top: 5px; }
        .chart-grid { position: relative; width: 100%; height: calc(100% - 58px); background-image: repeating-linear-gradient(to right, transparent, transparent calc(11.11% - 2px), #EAEAEA calc(11.11% - 2px), #EAEAEA 11.11%); }
        .chart-row { height: 50px; border-bottom: 2px solid #000; cursor: crosshair; position: relative; }
        #line-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .data-dot { position: absolute; width: 14px; height: 14px; background-color: #000; border: 3px solid #CCFF00; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }

        /* --- Ledger Master UI --- */
        .ledger-master { padding: 40px; background: #FFF; }
        .ledger-master h2 { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-top: 0; border-bottom: 4px solid #000; padding-bottom: 10px; }
        .ledger-row { display: grid; grid-template-columns: 70px 1fr 150px; gap: 15px; padding: 15px 10px; border-bottom: 2px solid #EAEAEA; align-items: center; transition: 0.2s; }
        .ledger-row:hover { background: #F9F9F9; }
        
        .ledger-serial { font-weight: 900; color: #000; background: #CCFF00; padding: 5px; text-align: center; border: 2px solid #000; font-size: 18px;}
        .ledger-desc { font-weight: 700; font-size: 18px; color: #000;}
        .ledger-date-stamp { color: #888; font-weight: 900; margin-right: 15px; font-size: 14px; border-right: 2px solid #CCC; padding-right: 15px;}
        .ledger-price { text-align: right; color: #000; font-weight: 900; font-size: 22px; }

        .total-row { background: #00E5FF !important; border: 4px solid #000 !important; margin-top: 20px; }
        .total-row:hover { background: #00E5FF !important; }

        /* --- Action Footer --- */
        .action-footer { display: flex; justify-content: space-between; padding: 20px 40px; background: #EAEAEA; border-top: 4px solid #000; flex-wrap: wrap; gap: 20px;}
        .export-section { text-align: center; }
        .export-section .subtext { font-size: 12px; font-weight: 700; margin-top: 5px; color: #555; text-transform: uppercase;}
        .big-action-btn { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 900; padding: 15px 30px; cursor: pointer; border: 4px solid #000; text-transform: uppercase; box-shadow: 6px 6px 0px #000; transition: 0.1s; }
        .big-action-btn:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #000; }
        .btn-export { background: #00E5FF; }
        .btn-nuke { background: #FF0055; color: #FFF; }

        /* --- Brutalist Modals --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .brutal-note { background: #FFF; width: 90%; max-width: 500px; padding: 30px; border: 4px solid #000; box-shadow: 15px 15px 0px #CCFF00; position: relative; }
        .expense-modal { box-shadow: 15px 15px 0px #00E5FF; } 
        .storage-modal { box-shadow: 15px 15px 0px #FF0055; }
        
        .close-x {
            position: absolute; top: -15px; right: -15px; width: 45px; height: 45px;
            background: #FF0055; color: #FFF; border: 4px solid #000;
            font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 900;
            cursor: pointer; box-shadow: 4px 4px 0px #000; transition: 0.1s;
            display: flex; justify-content: center; align-items: center;
        }
        .close-x:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }

        .brutal-note h3 { margin-top: 0; font-size: 28px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid #000; padding-bottom: 10px;}
        .brutal-note textarea { width: 100%; height: 200px; background: #EAEAEA; border: 2px solid #000; outline: none; font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: #000; resize: vertical; padding: 10px; line-height: 1.5; box-sizing: border-box;}
        .brutal-note textarea:focus { background: #FFF; }
        
        .modal-controls { display: flex; justify-content: space-between; margin-top: 15px; }
        .modal-btn { background: #000; color: #FFF; border: 2px solid #000; font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 900; padding: 10px 20px; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #000; transition: 0.1s; }
        .modal-btn:hover { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        .btn-save { box-shadow: 4px 4px 0px #CCFF00; width: 100%; }
        .btn-save:hover { box-shadow: 0px 0px 0px #CCFF00; background: #CCFF00; color: #000; }
        .btn-clear { box-shadow: 4px 4px 0px #FF0055; background: #FFF; color: #000; margin-right: 15px;}
        .btn-clear:hover { box-shadow: 0px 0px 0px #FF0055; background: #FF0055; color: #FFF; }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 950px) {
            .journal-content { flex-direction: column; }
            .habit-section { border-right: none; width: 100%; }
            .chart-section { width: 100%; border-top: 4px solid #000; min-width: unset; }
            .top-bar { flex-direction: column; text-align: center; }
            .date-nav { width: 100%; justify-content: center; }
        }

        @media (max-width: 600px) {
            body { padding: 5px; }
            .ledger-container { border-width: 2px; margin-bottom: 20px; box-shadow: 6px 6px 0px #000; }
            .top-bar { padding: 15px 10px; }
            
            .controls { flex-direction: column; width: 100%; }
            .controls input { width: 100%; box-sizing: border-box; }
            .controls button { width: 100%; box-sizing: border-box; }
            
            th, .date-col { padding: 10px; }
            
            .ledger-master { padding: 20px 10px; }
            .ledger-row { 
                grid-template-columns: 1fr auto; 
                grid-template-areas: "serial serial" "desc price";
                gap: 5px; padding: 10px 5px;
            }
            .ledger-serial { grid-area: serial; width: fit-content; font-size: 12px; padding: 2px 8px; margin-bottom: 5px; }
            .ledger-desc { grid-area: desc; font-size: 14px; line-height: 1.4; }
            .ledger-price { grid-area: price; font-size: 18px; align-self: end; }
            .ledger-date-stamp { display: block; border-right: none; margin-bottom: 4px; } 

            .action-footer { flex-direction: column; padding: 20px 10px; }
            .big-action-btn { width: 100%; font-size: 16px; box-sizing: border-box; }
            .export-section { width: 100%; margin-top: 10px; }
            .export-section button { width: 100%; }
            
            .brutal-note { padding: 20px; width: 85%; }
            .modal-controls { flex-direction: column; gap: 15px; }
            .btn-clear { margin-right: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="ledger-container">
        
        <div class="top-bar">
            <div class="date-nav">
                <button class="nav-btn" onclick="prevMonth()">&#8592;</button>
                <div style="display: flex; flex-direction: column;">
                    <select id="monthSelect" class="fast-travel-select"></select>
                    <select id="yearSelect" class="fast-travel-select" style="font-size: 30px;"></select>
                </div>
                <button class="nav-btn" onclick="nextMonth()">&#8594;</button>
            </div>
            
            <div class="expense-total">TOTAL SPENT: $<span id="monthly-total">0.00</span></div>

            <div class="controls">
                <input type="text" id="habitInput" placeholder="NEW HABIT...">
                <button class="good-btn" onclick="addHabit('good')">+ GOOD</button>
                <button class="bad-btn" onclick="addHabit('bad')">+ BAD</button>
            </div>
        </div>

        <div class="journal-wrapper">
            <div class="journal-content">
                <div class="habit-section">
                    <table id="journalTable">
                        <thead>
                            <tr id="table-header">
                                <th id="col-date" class="date-col" style="z-index: 5;">DAY</th>
                                <th id="col-spent" style="width: 120px;">SPENT</th>
                                <th id="col-log" style="width: 120px;">LOG</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                        </tbody>
                    </table>
                </div>

                <div class="chart-section" id="chart-section">
                    <div class="chart-header">
                        <input type="text" value="SLEEP TRACKER" class="chart-title-input" id="chart-title" title="Rename tracking metric">
                        <div class="chart-labels">
                            <span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>12</span><span>14</span><span>16</span><span>18</span>
                        </div>
                    </div>
                    <div class="chart-grid" id="chart-grid">
                        <svg id="line-canvas"></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="ledger-master">
            <h2>EXPENSE LEDGER</h2>
            <div id="ledger-entries"></div>
        </div>

        <div class="action-footer">
            <button class="big-action-btn btn-nuke" onclick="nukeMonth()">CLEAR MONTH</button>
            <div class="export-section">
                <button id="exportBtn" class="big-action-btn btn-export">DOWNLOAD DATA</button>
                <p class="subtext">Download... to never lose your data</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="diaryModal">
        <div class="brutal-note">
            <button class="close-x" onclick="forceCloseModal('diary')">X</button>
            <h3>DAY <span id="diaryDayNum"></span> LOG</h3>
            <textarea id="diaryTextArea" placeholder="ENTER DATA..."></textarea>
            <div class="modal-controls">
                <button class="modal-btn btn-clear" onclick="clearSpecificDay('diary')">CLEAR DAY</button>
                <button class="modal-btn btn-save" onclick="saveDiaryLog()">SAVE LOG</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="expenseModal">
        <div class="brutal-note expense-modal">
            <button class="close-x" onclick="forceCloseModal('expense')">X</button>
            <h3>DAY <span id="expenseDayNum"></span> EXPENSES</h3>
            <textarea id="expenseTextArea" placeholder="e.g.&#10;Server - 20&#10;Coffee - 5.50"></textarea>
            <div class="modal-controls">
                <button class="modal-btn btn-clear" onclick="clearSpecificDay('expense')">CLEAR DAY</button>
                <button class="modal-btn btn-save" onclick="saveExpenseLog()">TALLY TOTAL</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="storageModal">
        <div class="brutal-note storage-modal">
            <button class="close-x" onclick="forceCloseModal('storage')">X</button>
            <h3>SYSTEM OVERLOAD</h3>
            <p style="font-weight: 700; font-size: 18px;">Your device's local storage quota has been exceeded. Please export your current data and clear old months to free up space.</p>
            <div class="modal-controls">
                <button class="modal-btn btn-save" onclick="forceCloseModal('storage')">UNDERSTOOD</button>
            </div>
        </div>
    </div>

    <script>
        // --- Safe Storage Wrapper ---
        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
                    document.getElementById('storageModal').style.display = 'flex';
                } else {
                    console.error("Storage Error:", e);
                }
            }
        }

        // --- Date Engine & Fast Travel ---
        let currentDisplayedMonth = new Date().getMonth();
        let currentDisplayedYear = new Date().getFullYear();
        const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');

        monthNames.forEach((month, index) => {
            let opt = document.createElement('option');
            opt.value = index; opt.innerHTML = month;
            monthSelect.appendChild(opt);
        });

        for(let y = currentDisplayedYear - 10; y <= currentDisplayedYear + 10; y++) {
            let opt = document.createElement('option');
            opt.value = y; opt.innerHTML = y;
            yearSelect.appendChild(opt);
        }

        monthSelect.addEventListener('change', (e) => { currentDisplayedMonth = parseInt(e.target.value); loadMonthData(); });
        yearSelect.addEventListener('change', (e) => { currentDisplayedYear = parseInt(e.target.value); loadMonthData(); });

        let chartData, diaryEntries, expenseEntries, habitsList, habitGrid, daysInMonth;
        let currentEditingDay = null;

        function getMonthKey() { return `${monthNames[currentDisplayedMonth]}_${currentDisplayedYear}`; }

        const savedColWidths = JSON.parse(localStorage.getItem('brutal_col_widths')) || {};

        function loadMonthData() {
            const keySuffix = getMonthKey();
            daysInMonth = new Date(currentDisplayedYear, currentDisplayedMonth + 1, 0).getDate();
            
            monthSelect.value = currentDisplayedMonth;
            yearSelect.value = currentDisplayedYear;

            chartData = JSON.parse(localStorage.getItem(`brutal_chart_${keySuffix}`)) || new Array(daysInMonth).fill(null);
            diaryEntries = JSON.parse(localStorage.getItem(`brutal_diary_${keySuffix}`)) || new Array(daysInMonth).fill(""); 
            expenseEntries = JSON.parse(localStorage.getItem(`brutal_expenses_${keySuffix}`)) || new Array(daysInMonth).fill(""); 
            
            habitsList = JSON.parse(localStorage.getItem('brutal_habits_list')) || [];
            habitGrid = JSON.parse(localStorage.getItem(`brutal_habit_grid_${keySuffix}`)) || Array.from({length: daysInMonth}, () => new Array(habitsList.length).fill(""));

            document.getElementById('chart-title').value = localStorage.getItem(`brutal_chart_title_${keySuffix}`) || "SLEEP TRACKER";
            buildUI();
        }

        // --- Core UI Builder ---
        function buildUI() {
            const tableBody = document.getElementById('table-body');
            const headerRow = document.getElementById('table-header');
            const chartGrid = document.getElementById('chart-grid');
            
            tableBody.innerHTML = '';
            chartGrid.innerHTML = '<svg id="line-canvas"></svg>';
            
            while (headerRow.children.length > 3) { headerRow.removeChild(headerRow.lastChild); }

            ['col-date', 'col-spent', 'col-log'].forEach(id => {
                const el = document.getElementById(id);
                if(savedColWidths[id]) el.style.width = savedColWidths[id];
            });

            habitsList.forEach((habit, index) => {
                let th = document.createElement('th');
                let customId = `col-habit-${index}`;
                th.id = customId;
                th.innerHTML = `${habit.name} <button class="delete-col-btn" onclick="deleteHabit(this)">[ X ]</button>`;
                if(savedColWidths[customId]) th.style.width = savedColWidths[customId];
                headerRow.appendChild(th);
            });

            for (let i = 1; i <= daysInMonth; i++) {
                let tr = document.createElement('tr');
                let expBtnText = expenseEntries[i-1].trim() !== "" ? "[ $$$ ]*" : "[ $$$ ]";
                let logBtnText = diaryEntries[i-1].trim() !== "" ? "[ LOG ]*" : "[ LOG ]";

                // NOTICE: Removed style="padding:0;" here to fix the black block issue
                tr.innerHTML = `
                    <td class="date-col">${i}</td>
                    <td><button class="diary-btn expense-btn" id="expBtn-${i}" onclick="openModal('expense', ${i})">${expBtnText}</button></td>
                    <td><button class="diary-btn" id="logBtn-${i}" onclick="openModal('diary', ${i})">${logBtnText}</button></td>
                `;

                habitsList.forEach((habit, hIndex) => {
                    let td = document.createElement('td');
                    td.innerText = habitGrid[i-1][hIndex] || "";
                    if(td.innerText === "✔") td.style.color = "#8BC34A";
                    if(td.innerText === "✖") td.style.color = "#FF0055";
                    td.onclick = function() { toggleHabitCell(this); };
                    tr.appendChild(td);
                });

                tableBody.appendChild(tr);

                let chartRow = document.createElement('div');
                chartRow.className = 'chart-row';
                chartRow.onclick = (event) => plotChartPoint(event, i - 1);
                chartGrid.appendChild(chartRow);
            }

            buildLedger(); 
            setTimeout(drawChartLines, 50); 
            
            // Activate the custom resizers after building the table
            initTouchResizers();
        }

        // --- THE CUSTOM TOUCH/MOUSE RESIZER ENGINE ---
        function initTouchResizers() {
            const cols = document.querySelectorAll('th');
            cols.forEach(col => {
                // Clear old resizers if rebuilding UI
                const existing = col.querySelector('.touch-resizer');
                if(existing) existing.remove();

                const resizer = document.createElement('div');
                resizer.classList.add('touch-resizer');
                col.appendChild(resizer);
                
                let startX, startWidth;

                const mouseDownHandler = function(e) {
                    // Prevent text selection while dragging
                    e.preventDefault();
                    
                    // Determine if it's a mouse click or a screen touch
                    startX = e.type.includes('mouse') ? e.clientX : e.touches.clientX;
                    startWidth = parseInt(window.getComputedStyle(col).width, 10);

                    const mouseMoveHandler = function(e) {
                        const currentX = e.type.includes('mouse') ? e.clientX : e.touches.clientX;
                        const dx = currentX - startX;
                        col.style.width = `${startWidth + dx}px`;
                    };

                    const mouseUpHandler = function() {
                        document.removeEventListener('mousemove', mouseMoveHandler);
                        document.removeEventListener('mouseup', mouseUpHandler);
                        document.removeEventListener('touchmove', mouseMoveHandler);
                        document.removeEventListener('touchend', mouseUpHandler);
                        
                        // Save the custom width
                        let widths = JSON.parse(localStorage.getItem('brutal_col_widths')) || {};
                        widths[col.id] = col.style.width;
                        safeSetItem('brutal_col_widths', JSON.stringify(widths));
                    };

                    document.addEventListener('mousemove', mouseMoveHandler);
                    document.addEventListener('mouseup', mouseUpHandler);
                    // Add passive:false to stop the phone screen from scrolling horizontally while you try to drag the column
                    document.addEventListener('touchmove', mouseMoveHandler, { passive: false });
                    document.addEventListener('touchend', mouseUpHandler);
                };

                resizer.addEventListener('mousedown', mouseDownHandler);
                resizer.addEventListener('touchstart', mouseDownHandler, { passive: false });
            });
        }

        function prevMonth() { currentDisplayedMonth--; if (currentDisplayedMonth < 0) { currentDisplayedMonth = 11; currentDisplayedYear--; } loadMonthData(); }
        function nextMonth() { currentDisplayedMonth++; if (currentDisplayedMonth > 11) { currentDisplayedMonth = 0; currentDisplayedYear++; } loadMonthData(); }

        // --- Ledger Rendering ---
        function buildLedger() {
            const ledgerContainer = document.getElementById('ledger-entries');
            ledgerContainer.innerHTML = '';
            let serial = 1;
            let grandTotal = 0;

            expenseEntries.forEach((text, dayIndex) => {
                if(!text || text.trim() === "") return;
                const lines = text.split('\n');
                
                lines.forEach(line => {
                    if(line.trim() === "") return;
                    
                    let desc = line;
                    let price = 0.00;

                    const nums = line.match(/[-+]?[0-9]*\.?[0-9]+/g);
                    if (nums && nums.length > 0) {
                        const lastNum = nums[nums.length - 1];
                        price = parseFloat(lastNum);
                        desc = line.substring(0, line.lastIndexOf(lastNum)).replace(/[-:\s]+$/, '').trim();
                    }

                    if (desc === "") desc = "Entry";
                    grandTotal += price;

                    const row = document.createElement('div');
                    row.className = 'ledger-row';
                    row.innerHTML = `
                        <div class="ledger-serial">#${serial}</div>
                        <div class="ledger-desc"><span class="ledger-date-stamp">DAY ${dayIndex + 1}</span> ${desc}</div>
                        <div class="ledger-price">$${price.toFixed(2)}</div>
                    `;
                    ledgerContainer.appendChild(row);
                    serial++;
                });
            });

            document.getElementById('monthly-total').innerText = grandTotal.toFixed(2);

            if(serial === 1) {
                ledgerContainer.innerHTML = '<p style="font-weight:700;">NO EXPENSES LOGGED THIS MONTH.</p>';
            } else {
                const totalRow = document.createElement('div');
                totalRow.className = 'ledger-row total-row';
                totalRow.innerHTML = `
                    <div class="ledger-serial" style="background:#FFF; color:#FFF; border-color:transparent;">#</div>
                    <div class="ledger-desc" style="text-transform:uppercase; font-weight:900; text-align:right; padding-right:20px;">MONTHLY TOTAL</div>
                    <div class="ledger-price" style="font-size:24px;">$${grandTotal.toFixed(2)}</div>
                `;
                ledgerContainer.appendChild(totalRow);
            }
        }

        // --- Modal Functions ---
        function openModal(type, day) {
            currentEditingDay = day;
            if (type === 'diary') {
                document.getElementById('diaryDayNum').innerText = day;
                document.getElementById('diaryTextArea').value = diaryEntries[day - 1] || "";
                document.getElementById('diaryModal').style.display = 'flex';
            } else {
                document.getElementById('expenseDayNum').innerText = day;
                document.getElementById('expenseTextArea').value = expenseEntries[day - 1] || "";
                document.getElementById('expenseModal').style.display = 'flex';
            }
        }

        function forceCloseModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }

        function saveDiaryLog() {
            const val = document.getElementById('diaryTextArea').value;
            diaryEntries[currentEditingDay - 1] = val;
            safeSetItem(`brutal_diary_${getMonthKey()}`, JSON.stringify(diaryEntries));
            document.getElementById(`logBtn-${currentEditingDay}`).innerText = val.trim() !== "" ? "[ LOG ]*" : "[ LOG ]";
            forceCloseModal('diary');
        }

        function saveExpenseLog() {
            const val = document.getElementById('expenseTextArea').value;
            expenseEntries[currentEditingDay - 1] = val;
            safeSetItem(`brutal_expenses_${getMonthKey()}`, JSON.stringify(expenseEntries));
            document.getElementById(`expBtn-${currentEditingDay}`).innerText = val.trim() !== "" ? "[ $$$ ]*" : "[ $$$ ]";
            buildLedger(); 
            forceCloseModal('expense');
        }

        function clearSpecificDay(type) {
            if(!confirm("Erase this day's log?")) return;
            if (type === 'diary') { 
                document.getElementById('diaryTextArea').value = ""; saveDiaryLog();
            } else { 
                document.getElementById('expenseTextArea').value = ""; saveExpenseLog();
            }
        }

        // --- Habits ---
        function addHabit(type) {
            const input = document.getElementById('habitInput');
            const habitName = input.value.trim().toUpperCase();
            if (habitName === "") return;
            habitsList.push({ name: habitName, type: type });
            safeSetItem('brutal_habits_list', JSON.stringify(habitsList));
            input.value = ""; loadMonthData(); 
        }

        function toggleHabitCell(cell) {
            let currentDomIndex = Array.from(cell.parentElement.children).indexOf(cell);
            let currentHabitIndex = currentDomIndex - 3; 
            let dayIndex = Array.from(cell.parentElement.parentElement.children).indexOf(cell.parentElement);

            if (cell.innerText === "") {
                cell.innerText = habitsList[currentHabitIndex].type === 'good' ? "✔" : "✖";
                cell.style.color = habitsList[currentHabitIndex].type === 'good' ? "#8BC34A" : "#FF0055";
            } else { cell.innerText = ""; }

            if(!habitGrid[dayIndex]) habitGrid[dayIndex] = [];
            habitGrid[dayIndex][currentHabitIndex] = cell.innerText;
            safeSetItem(`brutal_habit_grid_${getMonthKey()}`, JSON.stringify(habitGrid));
        }

        function deleteHabit(btn) {
            if(!confirm("DESTROY THIS HABIT GLOBALLY?")) return;
            let th = btn.parentElement;
            let domIndex = Array.from(th.parentElement.children).indexOf(th);
            let habitIndex = domIndex - 3; 
            habitsList.splice(habitIndex, 1);
            safeSetItem('brutal_habits_list', JSON.stringify(habitsList));
            loadMonthData(); 
        }

        // --- Chart Logic ---
        document.getElementById('chart-title').addEventListener('input', function() {
            safeSetItem(`brutal_chart_title_${getMonthKey()}`, this.value);
        });

        function plotChartPoint(event, dayIndex) {
            const chartGrid = document.getElementById('chart-grid');
            chartData[dayIndex] = event.offsetX / chartGrid.offsetWidth; 
            safeSetItem(`brutal_chart_${getMonthKey()}`, JSON.stringify(chartData));
            drawChartLines();
        }

        function drawChartLines() {
            const chartGrid = document.getElementById('chart-grid');
            const svgCanvas = document.getElementById('line-canvas');
            if(!chartGrid || !svgCanvas) return;

            const chartWidth = chartGrid.offsetWidth;
            svgCanvas.innerHTML = '';
            document.querySelectorAll('.data-dot').forEach(e => e.remove());

            let pointsString = "";
            const rowHeight = 52; 

            chartData.forEach((ratio, dayIndex) => {
                if (ratio !== null) {
                    let xCoord = ratio * chartWidth;
                    let yCoord = (dayIndex * rowHeight) + (rowHeight / 2);
                    pointsString += `${xCoord},${yCoord} `;

                    let dot = document.createElement('div');
                    dot.className = 'data-dot';
                    dot.style.left = `${xCoord}px`; dot.style.top = `${yCoord}px`;
                    chartGrid.appendChild(dot);
                }
            });

            if (pointsString !== "") {
                let polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                polyline.setAttribute("points", pointsString.trim());
                polyline.setAttribute("fill", "none");
                polyline.setAttribute("stroke", "#000"); polyline.setAttribute("stroke-width", "5"); 
                svgCanvas.appendChild(polyline);
            }
        }

        // --- App Actions ---
        function nukeMonth() {
            if(!confirm(`WARNING: THIS WILL DELETE ALL DATA FOR ${getMonthKey().replace('_', ' ')}.\nProceed?`)) return;
            const keySuffix = getMonthKey();
            localStorage.removeItem(`brutal_chart_${keySuffix}`);
            localStorage.removeItem(`brutal_diary_${keySuffix}`);
            localStorage.removeItem(`brutal_expenses_${keySuffix}`);
            localStorage.removeItem(`brutal_habit_grid_${keySuffix}`);
            localStorage.removeItem(`brutal_chart_title_${keySuffix}`);
            loadMonthData(); 
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            const appData = JSON.stringify(localStorage, null, 2);
            const blob = new Blob([appData], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `brutal_ledger_backup_${new Date().getTime()}.json`; 
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });

        // Start
        new ResizeObserver(drawChartLines).observe(document.getElementById('chart-section'));
        loadMonthData();
        
    </script>
</body>
</html>
